<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Feed Sync - Shane Photography Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SHANE</h2>
                <p>Photography Admin</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="inquiries.html"><i class="fas fa-inbox"></i> Inquiries</a>
                <a href="bookings.html"><i class="fas fa-calendar-alt"></i> Bookings</a>
                <a href="packages.html"><i class="fas fa-box"></i> Packages</a>
                <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
                <a href="feed-sync.html" class="active"><i class="fab fa-facebook"></i> Facebook Feed</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Facebook Feed Synchronization</h1>
                <div class="admin-profile">
                    <span>Welcome, Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Shane+Admin&background=f5b342&color=0b0b0b&size=128" alt="Admin">
                </div>
            </header>

            <!-- Facebook API Configuration -->
            <div class="recent-section">
                <h2>Facebook API Configuration</h2>
                <div class="form-container" style="max-width: 100%;">
                    <div class="form-group">
                        <label>Page ID</label>
                        <input type="text" id="fbPageId" value="ShanePhotoography" placeholder="Facebook Page ID">
                    </div>
                    <div class="form-group">
                        <label>Access Token</label>
                        <input type="text" id="fbAccessToken" placeholder="Enter Facebook Access Token">
                        <small style="color: var(--gray);">Get from <a href="https://developers.facebook.com/tools/explorer/" target="_blank" style="color: var(--primary);">Facebook Graph Explorer</a></small>
                    </div>
                    <div class="form-group">
                        <label>Auto Sync Interval</label>
                        <select id="syncInterval">
                            <option value="15">Every 15 minutes</option>
                            <option value="30">Every 30 minutes</option>
                            <option value="60">Every hour</option>
                            <option value="360">Every 6 hours</option>
                            <option value="720">Every 12 hours</option>
                            <option value="1440">Once a day</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="saveFbConfig()">
                        <i class="fas fa-save"></i> Save Configuration
                    </button>
                </div>
            </div>

            <!-- Sync Controls -->
            <div class="recent-section">
                <h2>Manual Sync</h2>
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                    <button class="btn-primary" onclick="syncNow()">
                        <i class="fas fa-sync-alt"></i> Sync Now
                    </button>
                    <button class="btn-secondary" onclick="clearCache()">
                        <i class="fas fa-trash"></i> Clear Cache
                    </button>
                    <div style="margin-left: auto;">
                        <span id="lastSyncTime">Last sync: Never</span>
                    </div>
                </div>
            </div>

            <!-- Feed Preview -->
            <div class="recent-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Synced Posts</h2>
                    <div>
                        <span id="postCount" style="color: var(--primary); font-weight: 600;">0</span> posts
                    </div>
                </div>
                
                <div class="fb-feed-grid" id="fbPostsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem;">
                    <!-- Posts will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="fbPagination"></div>
            </div>
        </main>
    </div>

    <!-- Post Preview Modal -->
    <div class="modal" id="postModal">
        <div class="modal-content" style="max-width: 600px;">
            <button class="modal-close" onclick="closeModal('postModal')">
                <i class="fas fa-times"></i>
            </button>
            <h3 style="color: var(--primary); margin-bottom: 1.5rem;">Post Preview</h3>
            
            <div id="postPreviewContent" style="background: var(--dark-lighter); border-radius: 20px; overflow: hidden;">
                <!-- Post content will be loaded here -->
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn-primary" style="flex: 1;" onclick="viewOnFacebook()">
                    <i class="fab fa-facebook"></i> View on Facebook
                </button>
                <button class="btn-secondary" style="flex: 1;" onclick="hidePost()">
                    <i class="fas fa-eye-slash"></i> Hide from Feed
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from '../js/firebase-config.js';
        import { 
            collection, query, getDocs, doc, addDoc, updateDoc, deleteDoc, orderBy, limit, where 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentPosts = [];
        let currentPage = 1;
        const postsPerPage = 12;

        // Load synced posts
        async function loadSyncedPosts() {
            try {
                const grid = document.getElementById('fbPostsGrid');
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;"><div class="spinner"></div><p>Loading posts...</p></div>';

                const q = query(collection(db, 'facebook_posts'), orderBy('created_time', 'desc'));
                const snapshot = await getDocs(q);
                
                currentPosts = snapshot.docs;
                document.getElementById('postCount').textContent = currentPosts.length;
                
                // Get last sync time from settings
                const settingsDoc = await getDoc(doc(db, 'settings', 'facebook'));
                if (settingsDoc.exists()) {
                    const lastSync = settingsDoc.data().lastSync;
                    if (lastSync) {
                        document.getElementById('lastSyncTime').textContent = `Last sync: ${new Date(lastSync).toLocaleString()}`;
                    }
                }
                
                renderPosts(1);
                
            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('fbPostsGrid').innerHTML = 
                    '<div style="grid-column: 1/-1; text-align: center; color: var(--danger);">Error loading posts</div>';
            }
        }

        // Render posts with pagination
        function renderPosts(page) {
            const start = (page - 1) * postsPerPage;
            const end = start + postsPerPage;
            const pagePosts = currentPosts.slice(start, end);
            
            const grid = document.getElementById('fbPostsGrid');
            
            if (pagePosts.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No posts synced yet</div>';
                return;
            }

            grid.innerHTML = pagePosts.map(doc => {
                const post = doc.data();
                return `
                    <div class="fb-card" onclick="previewPost('${doc.id}')" style="cursor: pointer;">
                        <div class="fb-image">
                            ${post.image_url ? 
                                `<img src="${post.image_url}" alt="Post" style="width: 100%; height: 100%; object-fit: cover;">` : 
                                '<i class="fas fa-camera" style="font-size: 3rem; color: var(--gray);"></i>'
                            }
                        </div>
                        <div class="fb-content">
                            <p style="color: var(--light);">${post.message ? post.message.substring(0, 80) + '...' : 'Facebook Post'}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                                <span class="fb-date">${new Date(post.created_time).toLocaleDateString()}</span>
                                ${post.hidden ? '<i class="fas fa-eye-slash" style="color: var(--gray);"></i>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPagination();
        }

        // Pagination
        function renderPagination() {
            const totalPages = Math.ceil(currentPosts.length / postsPerPage);
            let paginationHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `
                    <div class="page-item ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</div>
                `;
            }
            
            document.getElementById('fbPagination').innerHTML = paginationHTML;
        }

        window.changePage = (page) => {
            currentPage = page;
            renderPosts(page);
        };

        // Sync with Facebook
        window.syncNow = async () => {
            const btn = document.querySelector('button[onclick="syncNow()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
            btn.disabled = true;

            try {
                const pageId = document.getElementById('fbPageId').value;
                const accessToken = document.getElementById('fbAccessToken').value;
                
                if (!accessToken) {
                    alert('Please enter Facebook Access Token');
                    return;
                }

                // Fetch from Facebook Graph API
                const response = await fetch(`https://graph.facebook.com/v18.0/${pageId}/posts?fields=id,message,full_picture,created_time,permalink_url&limit=50&access_token=${accessToken}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Save posts to Firebase
                for (const post of data.data) {
                    const postRef = doc(db, 'facebook_posts', post.id);
                    await updateDoc(postRef, {
                        id: post.id,
                        message: post.message || '',
                        image_url: post.full_picture || '',
                        created_time: post.created_time,
                        permalink_url: post.permalink_url,
                        last_synced: new Date().toISOString(),
                        hidden: false
                    }, { merge: true });
                }

                // Update last sync time
                await updateDoc(doc(db, 'settings', 'facebook'), {
                    lastSync: new Date().toISOString(),
                    pageId: pageId,
                    syncCount: data.data.length
                });

                alert(`Successfully synced ${data.data.length} posts!`);
                loadSyncedPosts();
                
            } catch (error) {
                console.error('Sync error:', error);
                alert('Error syncing: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // Save Facebook configuration
        window.saveFbConfig = async () => {
            const config = {
                pageId: document.getElementById('fbPageId').value,
                accessToken: document.getElementById('fbAccessToken').value,
                syncInterval: document.getElementById('syncInterval').value,
                updatedAt: new Date().toISOString()
            };
            
            await updateDoc(doc(db, 'settings', 'facebook'), config);
            alert('Configuration saved!');
        };

        // Post preview
        window.previewPost = async (id) => {
            const docRef = doc(db, 'facebook_posts', id);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const post = docSnap.data();
                document.getElementById('postPreviewContent').innerHTML = `
                    <div style="padding: 1.5rem;">
                        ${post.image_url ? 
                            `<img src="${post.image_url}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 15px; margin-bottom: 1rem;">` : 
                            ''
                        }
                        <p style="color: var(--light); line-height: 1.6;">${post.message || 'No message'}</p>
                        <div style="display: flex; justify-content: space-between; margin-top: 1rem; color: var(--gray);">
                            <span>Posted: ${new Date(post.created_time).toLocaleString()}</span>
                            <span>ID: ${post.id}</span>
                        </div>
                    </div>
                `;
                window.currentPostId = id;
                window.currentPostUrl = post.permalink_url;
                openModal('postModal');
            }
        };

        window.viewOnFacebook = () => {
            if (window.currentPostUrl) {
                window.open(window.currentPostUrl, '_blank');
            }
        };

        window.hidePost = async () => {
            await updateDoc(doc(db, 'facebook_posts', window.currentPostId), {
                hidden: true
            });
            closeModal('postModal');
            loadSyncedPosts();
        };

        window.clearCache = async () => {
            if (confirm('Clear all cached posts?')) {
                const snapshot = await getDocs(collection(db, 'facebook_posts'));
                for (const doc of snapshot.docs) {
                    await deleteDoc(doc.ref);
                }
                loadSyncedPosts();
            }
        };

        // Modal functions
        window.openModal = (modalId) => {
            document.getElementById(modalId).classList.add('active');
        };

        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
        };

        // Load saved config
        async function loadConfig() {
            const settingsDoc = await getDoc(doc(db, 'settings', 'facebook'));
            if (settingsDoc.exists()) {
                const config = settingsDoc.data();
                document.getElementById('fbPageId').value = config.pageId || 'ShanePhotoography';
                document.getElementById('fbAccessToken').value = config.accessToken || '';
                document.getElementById('syncInterval').value = config.syncInterval || '30';
            }
        }

        // Initial load
        loadConfig();
        loadSyncedPosts();

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('adminLoggedIn');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
